version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: educore_postgres
    environment:
      POSTGRES_DB: educore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: educore_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: